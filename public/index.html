<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>&#26085;&#21382;&#21516;&#27493;</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Rli Calendar Sync</p>
          <h1>&#26085;&#21382;&#21516;&#27493;</h1>
        </div>
        <div class="top-actions">
          <div class="status" id="syncStatus">&#36830;&#25509;&#20013;...</div>
          <button class="fullscreen-button" id="fullscreenButton" type="button">
            &#20840;&#23631;
          </button>
        </div>
      </header>

      <section class="calendar-shell">
        <div class="calendar-panel">
          <div class="monthbar">
            <button class="icon-button" id="prevMonth" type="button" aria-label="&#19978;&#20010;&#26376;">
              &lsaquo;
            </button>
            <div>
              <p class="muted">&#24403;&#21069;&#26376;&#20221;</p>
              <h2 id="monthTitle"></h2>
            </div>
            <button class="icon-button" id="nextMonth" type="button" aria-label="&#19979;&#20010;&#26376;">
              &rsaquo;
            </button>
          </div>

          <div class="weekdays" aria-hidden="true">
            <span>&#19968;</span>
            <span>&#20108;</span>
            <span>&#19977;</span>
            <span>&#22235;</span>
            <span>&#20116;</span>
            <span>&#20845;</span>
            <span>&#26085;</span>
          </div>
          <div class="calendar" id="calendar" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
