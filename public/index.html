<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e67e45" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="日历同步" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>&#26085;&#21382;&#21516;&#27493;</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/pwa-icon.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Rli Calendar Sync</p>
          <h1>&#26085;&#21382;&#21516;&#27493;</h1>
        </div>
        <div class="top-actions">
          <div class="status" id="syncStatus">&#36830;&#25509;&#20013;...</div>
          <button class="fullscreen-button" id="fullscreenButton" type="button">
            &#20840;&#23631;
          </button>
        </div>
      </header>

      <section class="calendar-shell">
        <div class="calendar-panel">
          <div class="monthbar">
            <button class="icon-button" id="prevMonth" type="button" aria-label="&#19978;&#20010;&#26376;">
              &lsaquo;
            </button>
            <div class="month-title">
              <p class="muted">&#24403;&#21069;&#26376;&#20221;</p>
              <h2 id="monthTitle"></h2>
              <button class="today-button" id="todayButton" type="button" aria-label="&#36339;&#36716;&#21040;&#20170;&#22825;">
                &#20170;&#22825;
              </button>
            </div>
            <button class="icon-button" id="nextMonth" type="button" aria-label="&#19979;&#20010;&#26376;">
              &rsaquo;
            </button>
          </div>

          <div class="weekdays" aria-hidden="true">
            <span>&#26143;&#26399;&#19968;</span>
            <span>&#26143;&#26399;&#20108;</span>
            <span>&#26143;&#26399;&#19977;</span>
            <span>&#26143;&#26399;&#22235;</span>
            <span>&#26143;&#26399;&#20116;</span>
            <span>&#26143;&#26399;&#20845;</span>
            <span>&#26143;&#26399;&#26085;</span>
          </div>
          <div class="calendar" id="calendar" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <div class="day-dialog" id="dayDialog" aria-hidden="true">
      <button class="dialog-backdrop" id="dialogBackdrop" type="button" aria-label="&#20851;&#38381;"></button>
      <section
        class="dialog-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dialogTitle"
      >
        <div class="dialog-head">
          <div>
            <p class="dialog-meta" id="dialogMeta"></p>
            <h2 id="dialogTitle"></h2>
          </div>
          <button class="dialog-close" id="dialogClose" type="button" aria-label="&#20851;&#38381;">
            &times;
          </button>
        </div>
        <div class="dialog-events" id="dialogEvents"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
